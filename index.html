<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator - No JS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="calculator-card">
            <header>
                <h1>BMI Calculator</h1>
            
            </header>

            
            <form action="/calculate" method="post" class="bmi-form">
                <div class="input-group">
                    <label for="weight">Weight (kg)</label>
                    <input type="number" id="weight" name="weight" step="0.1" min="20" max="300" 
                           placeholder="Enter weight" required>
                </div>

                <div class="input-group">
                    <label for="height">Height (cm)</label>
                    <input type="number" id="height" name="height" step="0.1" min="50" max="250" 
                           placeholder="Enter height" required>
                </div>

                <button type="submit" class="calc-button">
                    Calculate BMI
                </button>
            </form>

            
            <div class="results hide" id="results">
                <div class="bmi-result">
                    <span class="bmi-number" id="bmiValue">--</span>
                    <span class="bmi-label">Your BMI</span>
                </div>
                
                <div class="status" id="status">
                    <h2 id="category">--</h2>
                    <p id="rangeText">Range: 18.5 - 24.9</p>
                    <p class="advice" id="adviceText"></p>
                </div>
                
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
</div>
            </div>
        </div>
    </div>
</body>
</html>
